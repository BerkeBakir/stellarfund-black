<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5b4fc" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="320" fill="url(#sky)"/>
  <rect width="800" height="320" fill="url(#glow)"/>
  <g opacity="0.9">
    <circle cx="640" cy="80" r="46" fill="#fde68a" opacity="0.85"/>
  </g>
  <!-- water droplet -->
  <g transform="translate(400 130)">
    <path d="M0 -70 C 44 -10, 52 24, 0 60 C -52 24, -44 -10, 0 -70 Z" fill="#ffffff" opacity="0.92"/>
    <ellipse cx="-14" cy="18" rx="10" ry="16" fill="#c7d2fe" opacity="0.8"/>
  </g>
  <!-- waves -->
  <path d="M0 230 C 150 200, 250 260, 400 232 C 550 205, 650 262, 800 232 L800 320 L0 320 Z" fill="url(#wave)"/>
  <path d="M0 262 C 160 236, 250 288, 400 264 C 560 240, 660 290, 800 262 L800 320 L0 320 Z" fill="#6366f1" opacity="0.55"/>
</svg>
